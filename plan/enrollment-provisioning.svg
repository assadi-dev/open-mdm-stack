<text x="30" y="56" font-size="26" font-weight="700" fill="#1e1e1e"><tspan x="30" dy="0">Open MDM  -  Enrolement &amp; Provisioning  (DPC custom Device Owner)</tspan></text>
<text x="90" y="126" font-size="20" font-weight="600" fill="#ffffff"><tspan x="90" dy="0">Admin / Dashboard</tspan></text>
<text x="530" y="126" font-size="20" font-weight="600" fill="#ffffff"><tspan x="530" dy="0">Serveur API</tspan></text>
<text x="890" y="124" font-size="18" font-weight="600" fill="#ffffff"><tspan x="890" dy="0">Device (factory-reset)</tspan></text>
<text x="52" y="227" font-size="17" font-weight="400" fill="#1e1e1e"><tspan x="52" dy="0">1. Cree enrollment token</tspan></text>
<text x="462" y="219" font-size="17" font-weight="400" fill="#1e1e1e"><tspan x="462" dy="0">2. Genere le QR</tspan><tspan x="462" dy="22.1">   (token + image)</tspan></text>
<text x="52" y="359" font-size="17" font-weight="400" fill="#1e1e1e"><tspan x="52" dy="0">3. Affiche le QR</tspan><tspan x="52" dy="22.1">   au dashboard</tspan></text>
<text x="872" y="359" font-size="17" font-weight="400" fill="#1e1e1e"><tspan x="872" dy="0">4. Scan QR (6 taps)</tspan><tspan x="872" dy="22.1">   via Setup Wizard</tspan></text>
<text x="872" y="494" font-size="16" font-weight="400" fill="#1e1e1e"><tspan x="872" dy="0">5. Download APK DPC</tspan><tspan x="872" dy="20.8">   + set Device Owner</tspan><tspan x="872" dy="20.8">   + verif checksum</tspan></text>
<text x="872" y="653" font-size="17" font-weight="400" fill="#1e1e1e"><tspan x="872" dy="0">6. POST /enroll</tspan><tspan x="872" dy="22.1">   (token + infos)</tspan></text>
<text x="462" y="653" font-size="17" font-weight="400" fill="#1e1e1e"><tspan x="462" dy="0">7. Valide token,</tspan><tspan x="462" dy="22.1">   cree device -&gt; JWT</tspan></text>
<text x="872" y="788" font-size="16" font-weight="400" fill="#1e1e1e"><tspan x="872" dy="0">8. Applique policies</tspan><tspan x="872" dy="20.8">   + ouvre SSE +</tspan><tspan x="872" dy="20.8">   foreground service</tspan></text>
