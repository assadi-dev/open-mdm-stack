services:
  maildev:
    restart: unless-stopped
    image: maildev/maildev:latest
    ports:
    - "1080:1080"
    - "1025:1025"
     
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - "${S3_PORT}:9000"
      - "${S3_UI_PORT}:9001"
    volumes:
      - ./docker/data/rustfs-data:/data
    environment:
      - RUSTFS_ACCESS_KEY
      - RUSTFS_SECRET_KEY
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
    command: /data


  postgres:
    image: pgvector/pgvector:pg17-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DOCKER_DB_PASSWORD}
    ports:
      - "${DOCKER_DB_PORT}:5432"
    volumes:
      - ./docker/data/db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8336:80"
    depends_on:
      - postgres


  # Canvas server du MCP Excalidraw (UI + REST + WebSocket) que Claude pilote.
  # Mappé sur 5000 (le canvas écoute sur 3000 en interne, déjà pris par apps/web).
  excalidraw:
    image: ghcr.io/yctimlin/mcp_excalidraw-canvas:latest
    restart: unless-stopped
    ports:
      - "5000:3000"
